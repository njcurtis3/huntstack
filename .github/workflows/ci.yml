name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check API
        run: pnpm --filter @huntstack/api exec tsc --noEmit

      - name: Type check Web
        run: pnpm --filter @huntstack/web exec tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint API
        run: pnpm --filter @huntstack/api lint

      - name: Lint Web
        run: pnpm --filter @huntstack/web lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @huntstack/types build --if-present && pnpm --filter @huntstack/shared build --if-present

      - name: Build API
        run: pnpm --filter @huntstack/api build

      - name: Build Web
        run: pnpm --filter @huntstack/web build
        env:
          # Vite requires these at build time — set dummy values for CI
          VITE_API_URL: http://localhost:4001
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder
